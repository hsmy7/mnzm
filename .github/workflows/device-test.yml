name: Device Compatibility Test

on:
  workflow_dispatch:     # 手动触发
  release:
    types: [published]   # 发布时自动触发

jobs:
  compatibility-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device:
          - model=huawei_mate60pro,version=34.0
          - model=xiaomi_14,version=34.0
          - model=oppo_findx7,version=34.0
          - model=vivo_x100pro,version=34.0
          - model=honor_magic6pro,version=34.0
          - model=samsung_galaxys24,version=34.0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Release APK + Test APK
        run: |
          cd android
          ./gradlew assembleRelease assembleAndroidTest

      - name: Run Firebase Test Lab on ${{ matrix.device }}
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app android/app/build/outputs/apk/release/app-release.apk \
            --test android/app/build/outputs/apk/androidTest/release/app-release-androidTest.apk \
            --device ${{ matrix.device }},locale=zh_CN,orientation=landscape \
            --timeout 15m \
            --results-bucket gs://xianxia-test-results \
            --results-dir "$(date +%Y%m%d_%H%M%S)_$(echo ${{ matrix.device }} | cut -d= -f2 | cut -d, -f1)"
