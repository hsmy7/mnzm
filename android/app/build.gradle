def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def apiPropertiesFile = rootProject.file("api.properties")
def apiProperties = new Properties()
if (apiPropertiesFile.exists()) {
    apiProperties.load(new FileInputStream(apiPropertiesFile))
}

android {
    namespace = 'com.xianxia.sect'
    compileSdk = 35

    defaultConfig {
        applicationId = "com.xianxia.sect"
        minSdk = 24
        targetSdk = 35
        versionCode = 1600
        versionName = "1.6.00"

        buildConfigField "String", "API_BASE_URL", '"' + apiProperties.getProperty('API_BASE_URL', 'https://api.xianxia.com/api/') + '"'
        buildConfigField "String", "TAPTAP_CLIENT_ID", '"' + apiProperties.getProperty('TAPTAP_CLIENT_ID', '') + '"'
        buildConfigField "String", "TAPTAP_CLIENT_TOKEN", '"' + apiProperties.getProperty('TAPTAP_CLIENT_TOKEN', '') + '"'
        buildConfigField "boolean", "TAPTAP_IS_CN", apiProperties.getProperty('TAPTAP_IS_CN', 'true')

        // 支持64位架构 - 一加、OPPO等新设备必需
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    def keystoreFile = file(keystoreProperties.getProperty('storeFile', '../../../keystore/keystore.jks'))
    def canSignRelease = keystoreFile.exists()
        && keystoreProperties.getProperty('storePassword') != null
        && !keystoreProperties.getProperty('storePassword').isEmpty()

    if (!canSignRelease) {
        logger.lifecycle("Warning: Keystore not available at ${keystoreFile.absolutePath}. Building without release signing.")
    }

    signingConfigs {
        if (keystoreFile.exists()) {
            release {
                storeFile = keystoreFile
                storePassword = keystoreProperties.getProperty('storePassword', '')
                keyAlias = keystoreProperties.getProperty('keyAlias', 'xianxia_sect')
                keyPassword = keystoreProperties.getProperty('keyPassword', '')
                v1SigningEnabled = true
                v2SigningEnabled = true
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (canSignRelease) {
                signingConfig = signingConfigs.release
            }
            buildConfigField "boolean", "DEBUG_MODE", "false"
        }
        debug {
            minifyEnabled = false
            if (canSignRelease) {
                signingConfig = signingConfigs.release
            }
            buildConfigField "boolean", "DEBUG_MODE", "true"
        }
    }
    
    lint {
        checkReleaseBuilds = false
        abortOnError = false
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // 强制使用 UTF-8 编码编译（防止中文乱码）
        encoding = 'UTF-8'
    }

    // 强制所有 Java 编译任务使用 UTF-8
    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    // 强制所有 Kotlin 编译任务使用 UTF-8
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile) {
        kotlinOptions {
            jvmTarget = '17'
            freeCompilerArgs += ['-Xjsr305=strict', '-opt-in=kotlinx.serialization.ExperimentalSerializationApi']
        }
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig = true
        compose = true
    }

    composeOptions {
        kotlinCompilerExtensionVersion = '1.5.8'
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

