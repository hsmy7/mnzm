def schemaDir = file("${projectDir}/schemas/com.xianxia.sect.data.local.GameDatabase")
def hashFile = file("${projectDir}/schemas/.room_schema_hash")
def gameDatabaseFile = file("${projectDir}/src/main/java/com/xianxia/sect/data/local/GameDatabase.kt")
def migrationsFile = file("${projectDir}/src/main/java/com/xianxia/sect/data/local/DatabaseMigrations.kt")

task validateRoomSchema(group: 'verification', description: '校验 Room schema identity hash，Entity 变更但 version 未 bump 时编译失败') {
    doLast {
        if (!schemaDir.exists()) {
            println "WARN: Schema directory not found, skipping validation (run kspKotlin first to generate schemas)"
            return
        }
        def schemaFiles = schemaDir.listFiles()?.findAll { it.name.endsWith('.json') && it.name =~ /^\d+\.json$/ } ?: []
        if (schemaFiles.isEmpty()) {
            println "WARN: No schema JSON files found in ${schemaDir}, skipping validation"
            return
        }
        def latestSchema = schemaFiles.max { it.name.replaceAll('\\.json$', '').toInteger() }
        def latestVersion = latestSchema.name.replaceAll('\\.json$', '').toInteger()
        def schemaJson = new groovy.json.JsonSlurper().parse(latestSchema)
        def currentHash = schemaJson.identityHash

        def sourceContent = gameDatabaseFile.text
        def versionMatch = sourceContent =~ /version\s*=\s*(\d+)/
        if (!versionMatch) {
            throw new GradleException("ERROR: Cannot find version number in ${gameDatabaseFile.name}")
        }
        def declaredVersion = versionMatch[0][1].toInteger()

        if (hashFile.exists()) {
            def storedHash = hashFile.text.trim()
            if (currentHash != storedHash && declaredVersion == latestVersion) {
                throw new GradleException("""
============================================================
  ROOM SCHEMA VALIDATION FAILED
============================================================
  Entity schema has changed but database version was NOT bumped.

  Current declared version: ${declaredVersion}
  Current schema hash:      ${currentHash}
  Previously stored hash:    ${storedHash}

  FIX: Run './gradlew bumpRoomVersion' to auto-fix, or manually:
    1. Increment version in @Database annotation (${gameDatabaseFile.name})
    2. Add Migration${declaredVersion}To${declaredVersion + 1} to DatabaseMigrations.kt
    3. Register it in ALL_MIGRATIONS and MIGRATION_REGISTRY
    4. Run this task again to update the stored hash
============================================================
""".stripIndent())
            }
        }

        println "Room schema validation PASSED (version=${declaredVersion}, hash=${currentHash})"
    }
}

task storeRoomSchemaHash(group: 'build', description: '将当前 Room schema identity hash 存储到 .room_schema_hash 文件') {
    dependsOn 'kspDebugKotlin'
    doLast {
        if (!schemaDir.exists()) {
            throw new GradleException("Schema directory not found: ${schemaDir}. Run kspKotlin first.")
        }
        def schemaFiles = schemaDir.listFiles()?.findAll { it.name.endsWith('.json') && it.name =~ /^\d+\.json$/ } ?: []
        if (schemaFiles.isEmpty()) {
            throw new GradleException("No schema JSON files found in ${schemaDir}")
        }
        def latestSchema = schemaFiles.max { it.name.replaceAll('\\.json$', '').toInteger() }
        def schemaJson = new groovy.json.JsonSlurper().parse(latestSchema)
        def currentHash = schemaJson.identityHash
        hashFile.parentFile.mkdirs()
        hashFile.text = currentHash
        println "Stored room schema hash: ${currentHash}"
    }
}

task bumpRoomVersion(group: 'room', description: '自动 bump Room 版本号并生成空操作 Migration 类（修复 schema hash 不匹配）') {
    doFirst {
        if (!schemaDir.exists()) {
            throw new GradleException("Schema directory not found: ${schemaDir}. Run kspKotlin first to generate schemas.")
        }
    }
    doLast {
        def schemaFiles = schemaDir.listFiles()?.findAll { it.name.endsWith('.json') && it.name =~ /^\d+\.json$/ } ?: []
        if (schemaFiles.isEmpty()) {
            throw new GradleException("No schema JSON files found in ${schemaDir}")
        }
        def latestSchema = schemaFiles.max { it.name.replaceAll('\\.json$', '').toInteger() }
        def latestVersion = latestSchema.name.replaceAll('\\.json$', '').toInteger()

        def sourceContent = gameDatabaseFile.text
        def versionMatch = sourceContent =~ /version\s*=\s*(\d+)/
        if (!versionMatch) {
            throw new GradleException("Cannot find version number in ${gameDatabaseFile.name}")
        }
        def oldVersion = versionMatch[0][1].toInteger()
        def newVersion = oldVersion + 1

        def commentMatch = sourceContent =~ /(\/\/\s*版本)\d+(:\s*.+?hash\s*同步)/
        def newComment = commentMatch ? "${commentMatch[0][1]}${newVersion}${commentMatch[0][2]}" : "// 版本${newVersion}: schema identity hash 同步"

        sourceContent = sourceContent.replaceFirst(/version\s*=\s*\d+/, "version = ${newVersion}")
        sourceContent = sourceContent.replaceFirst(/\/\/\s*版本\d+:\s*schema identity hash\s*同步.*?不匹配/, newComment)
        gameDatabaseFile.text = sourceContent
        println "Bumped version: ${oldVersion} -> ${newVersion} in GameDatabase.kt"

        def migrationsContent = migrationsFile.text
        def lastMigrationClassMatch = migrationsContent =~ /(internal class Migration\d+To(\d+)\s*:\s*Migration\(\d+,\s*\d+\))/
        def lastMigrationEntries = null
        if (lastMigrationClassMatch) {
            lastMigrationEntries = lastMigrationClassMatch[lastMigrationClassMatch.count - 1]
        }
        def prevClassEnd = migrationsContent.indexOf('}', migrationsContent.indexOf('internal class Migration63To64'))
        while (prevClassEnd < migrationsContent.length() - 1 && migrationsContent.charAt(prevClassEnd + 1).trim() != '') {
            def nextEnd = migrationsContent.indexOf('}', prevClassEnd + 1)
            if (nextEnd == -1) break
            prevClassEnd = nextEnd
        }

        def newMigrationCode = """

    /**
     * v${oldVersion} -> v${newVersion}: schema identity hash 同步 (自动生成)
     *
     * 触发原因：v${oldVersion} 设定后 Entity schema 发生变更，
     * 导致编译后的 schema identity hash 与设备上已安装的 DB 不匹配。
     * 此迁移为空操作（no-op）。
     */
    internal class Migration${oldVersion}To${newVersion} : Migration(${oldVersion}, ${newVersion}) {
        override fun migrate(db: SupportSQLiteDatabase) {
            Log.i(TAG, "Migration ${oldVersion} to ${newVersion} - schema identity hash sync (no-op)")
        }
    }
"""

        def insertPos = migrationsContent.indexOf('\n', migrationsContent.indexOf('val ALL_MIGRATIONS'))
        migrationsContent = migrationsContent.substring(0, insertPos) + newMigrationCode + migrationsContent.substring(insertPos)

        migrationsContent = migrationsContent.replace(
            'Migration63To64()\n    )',
            "Migration63To64(),\n        Migration${oldVersion}To${newVersion}()\n    )"
        )

        migrationsContent = migrationsContent.replace(
            '63 to Migration63To64()\n    )',
            "63 to Migration63To64(),\n        ${oldVersion} to Migration${oldVersion}To${newVersion}()\n    )"
        )
        migrationsFile.text = migrationsContent
        println "Generated Migration${oldVersion}To${newVersion} in DatabaseMigrations.kt"
        println ""
        println "=== NEXT STEP ==="
        println "Run './gradlew storeRoomSchemaHash' to update the stored schema hash"
        println "Then rebuild the project"
    }
}

tasks.matching { it.name == 'preBuild' }.configureEach {
    dependsOn validateRoomSchema
}
