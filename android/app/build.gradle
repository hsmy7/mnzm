// Bugly mapping 存档 + 上传
def buglyAppId = findProperty('BUGLY_APP_ID') ?: ''
def buglyAppKey = findProperty('BUGLY_APP_KEY') ?: ''
def mappingVersionName = android.defaultConfig.versionName
def mappingPkgName = android.defaultConfig.applicationId
def mappingBuildDir = layout.buildDirectory
def mappingRootDir = layout.projectDirectory.dir("..")

tasks.register('archiveAndUploadMapping') {
    group = 'bugly'
    description = 'Archive mapping.txt and upload to Bugly for symbolication'
    doLast {
        def mappingFile = mappingBuildDir.file("outputs/mapping/release/mapping.txt").get().asFile
        if (!mappingFile.exists()) {
            logger.warn("mapping.txt not found, run assembleRelease first")
            return
        }
        def destDir = mappingRootDir.dir("mappings/${mappingVersionName}").asFile
        destDir.mkdirs()
        mappingFile.renameTo(new File(destDir, "mapping-${mappingVersionName}.txt"))
        logger.lifecycle("Mapping archived to ${destDir}")

        logger.lifecycle("Uploading mapping to Bugly...")
        def cmd = [
            'curl', '-k', '-s',
            "https://api.bugly.qq.com/openapi/file/upload/symbol?app_key=${buglyAppKey}&app_id=${buglyAppId}",
            '--form', 'api_version=1',
            '--form', "app_id=${buglyAppId}",
            '--form', "app_key=${buglyAppKey}",
            '--form', 'symbolType=1',
            '--form', "bundleId=${mappingPkgName}",
            '--form', "productVersion=${mappingVersionName}",
            '--form', 'fileName=mapping.txt',
            '--form', "file=@${destDir}/mapping-${mappingVersionName}.txt"
        ]
        logger.lifecycle("Bugly response: ${cmd.execute().text.trim()}")
    }
}
