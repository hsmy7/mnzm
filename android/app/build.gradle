android {
    namespace = 'com.xianxia.sect'

    defaultConfig {
        applicationId = "com.xianxia.sect"
        versionCode = 4003
        versionName = "4.0.03"

        buildConfigField "String", "API_BASE_URL", '"' + apiProperties.getProperty('API_BASE_URL', 'https://api.xianxia.com/api/') + '"'
        buildConfigField "String", "TAPTAP_CLIENT_ID", '"' + apiProperties.getProperty('TAPTAP_CLIENT_ID', '') + '"'
        buildConfigField "String", "TAPTAP_CLIENT_TOKEN", '"' + apiProperties.getProperty('TAPTAP_CLIENT_TOKEN', '') + '"'
        buildConfigField "boolean", "TAPTAP_IS_CN", apiProperties.getProperty('TAPTAP_IS_CN', 'true')
        buildConfigField "String", "TAPDB_CHANNEL", '"' + apiProperties.getProperty('TAPDB_CHANNEL', 'taptap') + '"'
        buildConfigField "String", "APK_SIGNATURE_HASH", '"' + apiProperties.getProperty('APK_SIGNATURE_HASH', '') + '"'
        buildConfigField "String", "BUGLY_APP_ID", '"' + apiProperties.getProperty('BUGLY_APP_ID', '') + '"'
        buildConfigField "String", "BUGLY_APP_KEY", '"' + apiProperties.getProperty('BUGLY_APP_KEY', '') + '"'

        // 仅保留 ARM 架构，模拟器通过 libhoudini 翻译运行（与主流国产手游一致）
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    androidResources {
        noCompress 'webp'
    }

    def keystoreFile = file(keystoreProperties.getProperty('storeFile', '../../../keystore/keystore.jks'))
    def canSignRelease = keystoreFile.exists() &&
        keystoreProperties.getProperty('storePassword') != null &&
        !keystoreProperties.getProperty('storePassword').isEmpty()

    if (!canSignRelease) {
        logger.lifecycle("Warning: Keystore not available at ${keystoreFile.absolutePath}. Building without release signing.")
    }

    signingConfigs {
        if (keystoreFile.exists()) {
            release {
                storeFile = keystoreFile
                storePassword = keystoreProperties.getProperty('storePassword', '')
                keyAlias = keystoreProperties.getProperty('keyAlias', 'xianxia_sect')
                keyPassword = keystoreProperties.getProperty('keyPassword', '')
                v1SigningEnabled = true
                v2SigningEnabled = true
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (canSignRelease) {
                signingConfig = signingConfigs.release
            }
            buildConfigField "boolean", "DEBUG_MODE", "false"
        }
        debug {
            debuggable false
            if (canSignRelease) {
                signingConfig = signingConfigs.release
            }
            buildConfigField "boolean", "DEBUG_MODE", "false"
        }
    }

    lint {
        checkReleaseBuilds = true
        abortOnError = true
        baseline = file("lint-baseline.xml")
        disable += "InvalidPackage"
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
        }
    }

    buildFeatures {
        buildConfig = true
        compose = true
    }

    composeCompiler {
        enableStrongSkippingMode = true
        stabilityConfigurationFile = rootProject.file("stability_config.conf")
        reportsDestination = layout.buildDirectory.dir("compose_metrics")
        metricsDestination = layout.buildDirectory.dir("compose_metrics")
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            excludes += ["**/x86/**", "**/x86_64/**"]
        }
    }
}

// Workaround: Kotlin/Hilt duplicates library classes (StackableItem from
// :core:domain) into app classpath. Strip before dexing (debug) or R8 (release).
tasks.matching { it.name == 'dexBuilderDebug' || it.name == 'minifyReleaseWithR8' }.configureEach {
    doFirst {
        file("$buildDir/tmp/kotlin-classes").eachFileRecurse { f ->
            if (f.name.startsWith('StackableItem') && f.name.endsWith('.class'))
                f.delete()
        }
        file("$buildDir/intermediates/classes").eachFileRecurse { f ->
            if (f.name.startsWith('StackableItem') && f.name.endsWith('.class'))
                f.delete()
        }
    }
}

